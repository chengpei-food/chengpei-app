<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="澄食管理">
<meta name="theme-color" content="#007787">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>澄食晨食 管理後台</title>
<style>
:root{
  --yellow:#F5A200;--yellow2:#F8B616;--yellow-bg:#FEF3DC;
  --teal:#007787;--teal-dark:#005f6e;--teal-light:#2BB7B3;--teal-bg:#E6F4F5;
  --beige:#F3DFCC;--beige-dark:#EAD0B6;
  --admin-bg:#FFFFFF;--admin-card:#F5F9FA;--admin-border:#D8E8EA;
  --white:#FFFFFF;--text:#1A1A1A;--text2:#5A7A7D;--text3:#9ABABD;
  --divider:#D8E8EA;--shadow:rgba(0,0,0,0.08);
  --radius:14px;--radius-sm:8px;
  --tab-h:64px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,'PingFang TC','Helvetica Neue',sans-serif;background:var(--admin-bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;}

/* ── Header ── */
.app-header{background:var(--teal);color:white;height:calc(56px + var(--safe-top));padding-top:var(--safe-top);display:flex;align-items:center;justify-content:space-between;padding-left:18px;padding-right:14px;flex-shrink:0;border-bottom:none;}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-logo{width:44px;height:34px;background:transparent;border-radius:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-title{font-size:1rem;font-weight:700;}
.header-sub{font-size:0.68rem;color:rgba(255,255,255,0.7);margin-top:1px;}
.header-logout{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:16px;padding:5px 11px;font-size:0.75rem;cursor:pointer;}
.header-logout:active{background:rgba(255,255,255,0.25);}
.header-stripe{height:3px;background:linear-gradient(90deg,var(--yellow) 0%,var(--yellow2) 40%,var(--teal-light) 100%);flex-shrink:0;}

/* ── Screens ── */
.screens{flex:1;overflow:hidden;position:relative;min-height:0;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── Login ── */
.login-screen{background:#F0F7F8;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;overflow-y:auto;flex:1;}
.login-logo{background:transparent;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.login-brand{font-size:1.4rem;font-weight:800;color:var(--teal);margin-bottom:4px;}
.login-slogan{font-size:0.78rem;color:var(--text3);letter-spacing:0.08em;margin-bottom:28px;}
.login-card{background:var(--admin-card);border-radius:20px;padding:24px 22px;width:100%;max-width:360px;border:1px solid var(--admin-border);}
.login-subtitle{font-size:0.8rem;color:var(--text2);margin-bottom:20px;text-align:center;letter-spacing:0.05em;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.72rem;font-weight:700;color:var(--teal);margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--admin-border);border-radius:var(--radius-sm);font-size:0.95rem;outline:none;color:var(--text);font-family:inherit;background:#FFFFFF;}
.field input:focus{border-color:var(--teal);}
.login-btn{width:100%;padding:14px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:800;cursor:pointer;margin-top:4px;}
.login-btn:active{background:var(--teal-dark);}
.login-err{color:#EF9A9A;font-size:0.82rem;text-align:center;margin-top:10px;display:none;}
.login-err.show{display:block;}

/* ── Scrollable bodies ── */
.screen-body{flex:1;overflow-y:auto;padding:14px 13px calc(var(--tab-h) + var(--safe-bottom) + 14px);}
.screen-body::-webkit-scrollbar{width:3px;}
.screen-body::-webkit-scrollbar-thumb{background:var(--admin-border);border-radius:3px;}

/* ── Dashboard ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--admin-card);border-radius:var(--radius);padding:16px;border:1px solid var(--admin-border);}
.stat-value{font-size:1.8rem;font-weight:800;color:var(--yellow);margin-bottom:4px;}
.stat-label{font-size:0.75rem;color:var(--text2);}
.sec-title{font-size:0.72rem;font-weight:800;color:var(--teal);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;margin-top:20px;}
.sec-title:first-child{margin-top:0;}
.recent-order{background:var(--admin-card);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;border:1px solid var(--admin-border);}
.ro-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.ro-no{font-size:0.82rem;font-weight:700;color:var(--teal);}
.ro-time{font-size:0.72rem;color:var(--text3);}
.ro-name{font-size:0.88rem;font-weight:600;margin-bottom:2px;}
.ro-preview{font-size:0.75rem;color:var(--text2);}
.ro-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.ro-total{font-weight:800;color:var(--yellow);}

/* ── Status badge ── */
.status-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:0.72rem;font-weight:700;}
.s-pending{background:#FEF3DC;color:#c47f00;}
.s-confirmed{background:#E6F4F5;color:#007787;}
.s-shipping{background:#E8F5E9;color:#2E7D32;}
.s-done{background:#F0F0F0;color:#777777;border:1px solid #DDDDDD;}

/* ── Orders screen ── */
.filter-bar{background:var(--admin-card);border-bottom:1px solid var(--admin-border);padding:10px 13px;overflow-x:auto;white-space:nowrap;flex-shrink:0;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{display:inline-block;padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1.5px solid var(--admin-border);background:transparent;color:var(--text2);margin-right:7px;transition:all 0.15s;}
.filter-chip.active{background:var(--teal);color:white;border-color:var(--teal);}
.order-card{background:var(--admin-card);border-radius:var(--radius);padding:14px 15px;margin-bottom:10px;border:1px solid var(--admin-border);}
.oc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.oc-no{font-size:0.85rem;font-weight:800;color:var(--teal);}
.oc-date{font-size:0.72rem;color:var(--text3);}
.oc-customer{font-size:0.9rem;font-weight:700;margin-bottom:2px;}
.oc-contact{font-size:0.75rem;color:var(--text2);margin-bottom:8px;}
.oc-items{font-size:0.78rem;color:var(--text2);margin-bottom:8px;line-height:1.6;padding:8px 10px;background:var(--teal-bg);border-radius:8px;}
.oc-foot{display:flex;justify-content:space-between;align-items:center;}
.oc-total{font-weight:800;font-size:1rem;color:var(--yellow);}
.oc-addr{font-size:0.73rem;color:var(--text3);margin-bottom:6px;}
.oc-note{font-size:0.73rem;color:var(--text3);margin-bottom:8px;}
.status-select{background:var(--admin-bg);color:var(--text);border:1.5px solid var(--admin-border);border-radius:8px;padding:6px 10px;font-size:0.82rem;font-family:inherit;cursor:pointer;outline:none;}
.status-select:focus{border-color:var(--teal-light);}
.export-btn{background:var(--yellow);color:#FFFFFF;border:none;border-radius:8px;padding:8px 16px;font-size:0.82rem;font-weight:800;cursor:pointer;flex-shrink:0;}
.export-btn:active{background:var(--yellow2);}
.orders-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--admin-card);border-bottom:1px solid var(--admin-border);flex-shrink:0;}

/* ── Products screen ── */
.prod-manage-card{background:var(--admin-card);border-radius:var(--radius);padding:13px 15px;margin-bottom:8px;border:1px solid var(--admin-border);}
.pm-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.pm-name{font-size:0.9rem;font-weight:700;}
.pm-spec{font-size:0.73rem;color:var(--text2);margin-bottom:8px;}
.pm-foot{display:flex;justify-content:space-between;align-items:center;}
.pm-price-wrap{display:flex;align-items:center;gap:6px;}
.pm-price-label{font-size:0.72rem;color:var(--text3);}
.pm-price-input{background:#FFFFFF;color:var(--yellow);border:1.5px solid var(--admin-border);border-radius:8px;padding:7px 10px;font-size:0.95rem;font-weight:700;width:90px;outline:none;font-family:inherit;}
.pm-price-input:focus{border-color:var(--teal-light);}
.pm-save-btn{background:var(--teal);color:white;border:none;border-radius:8px;padding:7px 16px;font-size:0.88rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.toggle-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.soldout-btn{font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:8px;border:1.5px solid #F5A200;background:white;color:#c47f00;cursor:pointer;white-space:nowrap;}
.soldout-btn.active{background:#F5A200;color:white;border-color:#F5A200;}
.soldout-badge{display:inline-block;font-size:0.65rem;font-weight:800;color:#F5A200;background:#FEF3DC;border:1px solid #F5A200;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.toggle-label{font-size:0.75rem;color:var(--text2);}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#CCCCCC;border-radius:12px;transition:0.2s;}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s;}
input:checked + .slider{background:var(--teal);}
input:checked + .slider:before{transform:translateX(20px);}
.prod-search{background:var(--admin-card);padding:10px 13px;border-bottom:1px solid var(--admin-border);flex-shrink:0;}
.prod-search input{width:100%;background:#FFFFFF;border:1.5px solid var(--admin-border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:0.92rem;outline:none;font-family:inherit;}
.prod-search input:focus{border-color:var(--teal-light);}
.prod-search input::placeholder{color:var(--text3);}

/* ── Customers screen ── */
.cust-card{background:var(--admin-card);border-radius:var(--radius);padding:14px 15px;margin-bottom:8px;border:1px solid var(--admin-border);}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.cc-name{font-size:0.95rem;font-weight:700;}
.cc-phone{font-size:0.78rem;color:var(--teal);}
.cc-company{font-size:0.78rem;color:var(--text2);margin-bottom:6px;}
.cc-stats{display:flex;gap:16px;}
.cc-stat{font-size:0.75rem;color:var(--text2);}
.cc-stat span{font-weight:800;color:var(--yellow);margin-right:2px;}

/* ── Tab Bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--teal);border-top:none;display:flex;z-index:50;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;padding:8px 0;position:relative;}
.tab-icon{font-size:1.3rem;transition:transform 0.15s;}
.tab-label{font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:0.02em;}
.tab.active .tab-label{color:var(--teal-light);}
.tab.active .tab-icon{transform:scale(1.1);}
.pending-dot{position:absolute;top:8px;right:calc(50% - 18px);background:var(--yellow);color:var(--admin-bg);border-radius:10px;min-width:18px;height:18px;font-size:0.66rem;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--admin-bg);}
.pending-dot.show{display:flex;}

/* ── Settings ── */
.settings-body{flex:1;overflow-y:auto;padding:16px 13px calc(var(--tab-h) + var(--safe-bottom) + 16px);}
.settings-card{background:var(--admin-card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--admin-border);margin-bottom:16px;}
.settings-field{padding:13px 16px;border-bottom:1px solid var(--admin-border);display:flex;flex-direction:column;gap:5px;}
.settings-field:last-child{border-bottom:none;}
.settings-label{font-size:0.72rem;font-weight:700;color:var(--teal-light);}
.settings-field input{background:transparent;border:none;outline:none;font-size:0.95rem;color:var(--text);font-family:inherit;}
.settings-field input::placeholder{color:var(--text3);}
.save-settings-btn{width:100%;padding:14px;background:var(--teal);color:white;border:none;border-radius:var(--radius);font-size:1rem;font-weight:800;cursor:pointer;}
.save-settings-btn:active{background:var(--teal-dark);}
.danger-btn{width:100%;padding:14px;background:rgba(229,57,53,0.15);color:#EF9A9A;border:1px solid rgba(229,57,53,0.3);border-radius:var(--radius);font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:10px;}
[contenteditable][placeholder]:empty:before{content:attr(placeholder);color:var(--text3);pointer-events:none;}

/* ── Empty state ── */
.empty-state{text-align:center;color:var(--text3);padding:60px 20px;font-size:0.9rem;line-height:1.7;}
</style>
</head>

  <!-- DASHBOARD -->
  <div class="screen" id="screen-dashboard">
    <div class="screen-body" id="dashBody"></div>
  </div>

  <!-- ORDERS -->
  <div class="screen" id="screen-orders">
    <div class="orders-toolbar">
      <span style="font-size:0.85rem;font-weight:700;">所有訂單</span>
      <button class="export-btn" onclick="exportExcel()">📥 匯出 Excel</button>
    </div>
    <!-- 日期篩選列 -->
    <div style="background:var(--admin-card);border-bottom:1px solid var(--admin-border);padding:8px 13px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;">
      <span style="font-size:0.78rem;color:var(--text2);font-weight:700;white-space:nowrap;">📅 日期</span>
      <input type="date" id="orderDateFrom" onchange="renderOrders()" style="flex:1;min-width:120px;padding:6px 8px;border:1.5px solid var(--admin-border);border-radius:8px;font-size:0.82rem;color:var(--text);background:#fff;outline:none;">
      <span style="font-size:0.78rem;color:var(--text3);">～</span>
      <input type="date" id="orderDateTo" onchange="renderOrders()" style="flex:1;min-width:120px;padding:6px 8px;border:1.5px solid var(--admin-border);border-radius:8px;font-size:0.82rem;color:var(--text);background:#fff;outline:none;">
      <button onclick="clearDateFilter()" style="background:none;border:1.5px solid var(--admin-border);border-radius:8px;padding:5px 10px;font-size:0.78rem;color:var(--text2);cursor:pointer;white-space:nowrap;">清除</button>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="filter-bar" id="custFilterBar" style="border-top:1px solid var(--admin-border);"></div>
    <div class="screen-body" id="ordersBody"></div>
  </div>

  <!-- PRODUCTS -->
  <div class="screen" id="screen-products">
    <div style="padding:10px 13px 0;display:flex;justify-content:flex-end;flex-shrink:0;">
      <button onclick="openProdForm(null)" id="addProdBtn" style="background:var(--teal);color:white;border:none;border-radius:12px;padding:8px 18px;font-size:0.88rem;font-weight:700;cursor:pointer;">＋ 新增品項</button>
    </div>
    <!-- 新增／編輯品項表單 -->
    <div id="prodForm" style="display:none;margin:10px 13px;background:white;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.12);flex-shrink:0;">
      <div style="font-size:0.95rem;font-weight:800;color:#007787;margin-bottom:14px;" id="prodFormTitle">新增品項</div>
      <input type="hidden" id="prodEditCode">
      <div style="margin-bottom:10px;">
        <label style="display:block;font-size:0.72rem;font-weight:700;color:#007787;margin-bottom:4px;">品項編碼 *</label>
        <input type="text" id="pf-code" placeholder="例：AE0012" style="width:100%;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:0.9rem;color:#1A1A1A;background:white;box-sizing:border-box;" oninput="this.value=this.value.toUpperCase()">
        <div id="pf-code-hint" style="font-size:0.7rem;color:var(--text3);margin-top:3px;"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div><label style="display:block;font-size:0.72rem;font-weight:700;color:#007787;margin-bottom:4px;">品名 *</label><input type="text" id="pf-name" placeholder="品項名稱" style="width:100%;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:0.9rem;color:#1A1A1A;background:white;box-sizing:border-box;"></div>
        <div><label style="display:block;font-size:0.72rem;font-weight:700;color:#007787;margin-bottom:4px;">單位 *</label><input type="text" id="pf-unit" placeholder="包、箱、盒…" style="width:100%;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:0.9rem;color:#1A1A1A;background:white;box-sizing:border-box;"></div>
      </div>
      <div style="margin-bottom:10px;"><label style="display:block;font-size:0.72rem;font-weight:700;color:#007787;margin-bottom:4px;">規格</label><input type="text" id="pf-spec" placeholder="箱/8包/5斤" style="width:100%;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:0.9rem;color:#1A1A1A;background:white;box-sizing:border-box;"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;">
        <div><label style="display:block;font-size:0.72rem;font-weight:700;color:#007787;margin-bottom:4px;">售價 *</label><input type="number" id="pf-price" placeholder="0" min="0" step="0.5" style="width:100%;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:0.9rem;color:#1A1A1A;background:white;box-sizing:border-box;"></div>
        <div><label style="display:block;font-size:0.72rem;font-weight:700;color:#007787;margin-bottom:4px;">儲存方式</label>
          <select id="pf-storage" style="width:100%;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:0.9rem;color:#1A1A1A;background:white;box-sizing:border-box;">
            <option value="常溫">常溫</option><option value="冷藏">冷藏</option><option value="冷凍">冷凍</option>
          </select>
        </div>
        <div><label style="display:block;font-size:0.72rem;font-weight:700;color:#007787;margin-bottom:4px;">分類 *</label>
          <select id="pf-category" style="width:100%;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:0.9rem;color:#1A1A1A;background:white;box-sizing:border-box;">
            <option value="肉品食材">🥩 肉品食材</option>
            <option value="蔬果農產品">🥦 蔬果農產品</option>
            <option value="醬料食材">🧴 醬料食材</option>
            <option value="乾貨五金">🧂 乾貨五金</option>
            <option value="茶飲食用材料">🍵 茶飲食用材料</option>
            <option value="點心食材">🍡 點心食材</option>
            <option value="米麵製品">🍜 米麵製品</option>
            <option value="麵包堡體">🍞 麵包堡體</option>
            <option value="包材用品">📦 包材用品</option>
            <option value="印刷消耗品">🖨️ 印刷消耗品</option>
            <option value="現場硬體">🔧 現場硬體</option>
            <option value="未分類">📋 未分類</option>
          </select>
        </div>
      </div>
      <div id="prodFormErr" style="color:#e53935;font-size:0.82rem;margin-bottom:8px;display:none;"></div>
      <div style="display:flex;gap:10px;">
        <button type="button" onclick="closeProdForm()" style="flex:1;padding:11px;border:1.5px solid #ccc;border-radius:10px;background:white;font-size:0.9rem;cursor:pointer;color:#333;font-weight:600;">取消</button>
        <button type="button" onclick="saveProd()" style="flex:1;padding:11px;background:#007787;color:white;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;">儲存</button>
      </div>

/* ── Firebase / 雲端資料庫 ── */
let db = null;
try {
  if(typeof FIREBASE_CONFIG!=='undefined' && FIREBASE_CONFIG.projectId && !FIREBASE_CONFIG.projectId.startsWith('YOUR')){
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    console.log('✅ Firebase 已連線');
  }
} catch(e){ console.warn('Firebase 初始化失敗，使用本機儲存', e); }

const _CACHE = {};

async function dbLoad(key, fallback){
  if(db){
    try{
      const snap = await db.collection('cp_data').doc(key).get();
      if(snap.exists && snap.data().data !== undefined){
        _CACHE[key] = snap.data().data;
        localStorage.setItem('cp_'+key, JSON.stringify(_CACHE[key]));
        return _CACHE[key];
      }
    } catch(e){ console.warn('Firestore 讀取失敗:', key, e); }
  }
  if(_CACHE[key] !== undefined) return _CACHE[key];
  const local = localStorage.getItem('cp_'+key);
  _CACHE[key] = local ? JSON.parse(local) : fallback;
  return _CACHE[key];
}

function dbSave(key, data){
  _CACHE[key] = data;
  localStorage.setItem('cp_'+key, JSON.stringify(data));
  if(db) db.collection('cp_data').doc(key).set({data}).catch(e=>console.warn('Firestore 寫入失敗:', key, e));
}

async function initDB(){
  await Promise.all([
    dbLoad('products', null),
    dbLoad('orders', []),
    dbLoad('customers', []),
    dbLoad('config', {})
  ]);
  // 初始化品項
  if(!_CACHE.products || !_CACHE.products.length) dbSave('products', INIT_PRODUCTS);
  // 初始化客戶（版本號確保首次強制寫入）
  if(localStorage.getItem('cp_cust_ver')!=='6'){
    dbSave('customers', INIT_CUSTOMERS);
    localStorage.setItem('cp_cust_ver','6');
  }
  // 同步密碼
  const cfg = _CACHE.config || {};
  if(cfg.adminPw) localStorage.setItem('cp_admin_pw', cfg.adminPw);
  if(cfg.limitedAdminPw) localStorage.setItem('cp_admin_limited_pw', cfg.limitedAdminPw);
  // 密碼版本
  if(localStorage.getItem('cp_pw_ver')!=='2'){
    localStorage.setItem('cp_admin_pw', DEFAULT_PW);
    localStorage.setItem('cp_pw_ver','2');
  }
  // 即時訂單監聽（管理員在線時自動更新）
  if(db){
    db.collection('cp_data').doc('orders').onSnapshot(snap=>{
      if(!snap.exists) return;
      const fresh = snap.data().data;
      if(!fresh) return;
      _CACHE.orders = fresh;
      localStorage.setItem('cp_orders', JSON.stringify(fresh));
      if(sessionStorage.getItem('cp_admin')==='1'){
        updatePendingDot?.();
        const active = document.querySelector('.tab.active')?.id;
        if(active==='tab-orders'){ renderFilterBar(); renderOrders(); }
        if(active==='tab-dashboard') renderDashboard();
      }
    });
  }
}

function getAdminPw(){ return (_CACHE.config||{}).adminPw || localStorage.getItem('cp_admin_pw') || DEFAULT_PW; }
function getLimitedPw(){ return (_CACHE.config||{}).limitedAdminPw || localStorage.getItem('cp_admin_limited_pw') || DEFAULT_LIMITED_PW; }
function getAdminRole(){ return sessionStorage.getItem('cp_admin_role')||'super'; }
function isLimited(){ return getAdminRole()==='limited'; }
function getOrders(){ return _CACHE.orders || JSON.parse(localStorage.getItem('cp_orders')||'[]'); }
function saveOrders(d){ dbSave('orders', d); }
function getCustomers(){ return _CACHE.customers || JSON.parse(localStorage.getItem('cp_customers')||'[]'); }
function saveCustomers(d){ dbSave('customers', d); }
function getProducts(){ return _CACHE.products || JSON.parse(localStorage.getItem('cp_products')||'null') || INIT_PRODUCTS; }
function saveProducts(d){ dbSave('products', d); }

/* ── Auth ── */
function togglePw(inputId, btnId){
  const el=document.getElementById(inputId);
  const btn=typeof btnId==='string'?document.getElementById(btnId):btnId;
  const show=el.type==='password';
  el.type=show?'text':'password';
  btn.textContent=show?'🙈':'👁';
}
function doAdminLogin(){
  const pw=document.getElementById('adminPw').value;
  if(pw===getAdminPw()){ loginSuccess('super'); }
  else if(pw===getLimitedPw()){ loginSuccess('limited'); }
  else { const e=document.getElementById('loginErr'); e.textContent='密碼錯誤'; e.classList.add('show'); }
}
function loginSuccess(role){
  role = role || 'super';
  sessionStorage.setItem('cp_admin','1');
  sessionStorage.setItem('cp_admin_role', role);
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('appHeader').style.display='flex';
  document.getElementById('headerStripe').style.display='block';
  document.getElementById('tabBar').style.display='flex';
  // 限制管理員：隱藏不適用的 tab
  const limited = (role==='limited');
  ['tab-products','tab-settings'].forEach(id=>{
    document.getElementById(id).style.display = limited ? 'none' : '';
  });
  // 顯示角色標籤
  const roleTag = document.getElementById('roleTag');
  roleTag.textContent = limited ? '限制管理員' : '超級管理員';
  roleTag.style.display = 'inline';
  initApp();
  const lastTab = sessionStorage.getItem('cp_admin_tab') || 'dashboard';
  goTab(lastTab);
}
function logout(){
  sessionStorage.removeItem('cp_admin');
  sessionStorage.removeItem('cp_admin_role');
  sessionStorage.removeItem('cp_admin_tab');
  document.getElementById('appHeader').style.display='none';
  document.getElementById('headerStripe').style.display='none';
  document.getElementById('tabBar').style.display='none';
  document.getElementById('roleTag').style.display='none';
  ['dashboard','orders','products','customers','settings'].forEach(t=>document.getElementById('screen-'+t).classList.remove('active'));
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('adminPw').value='';
}

const STATUS_LABEL={pending:'待確認',confirmed:'已確認',shipping:'出貨中',done:'已完成'};
const STATUS_CLASS={pending:'s-pending',confirmed:'s-confirmed',shipping:'s-shipping',done:'s-done'};
function fmt(n){ return '$'+(Math.round(n*10)/10).toLocaleString(); }

function renderDashboard(){
  const orders=getOrders();
  const customers=getCustomers();
  const pending=orders.filter(o=>o.status==='pending').length;
  const todayStr=new Date().toISOString().slice(0,10);
  const todayOrders=orders.filter(o=>o.createdAt.slice(0,10)===todayStr);
  const totalRevenue=orders.filter(o=>o.status==='done').reduce((s,o)=>s+o.total,0);
  const recent=orders.slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,5);
  const dot=document.getElementById('pendingDot');
  dot.textContent=pending; dot.classList.toggle('show',pending>0);
  document.getElementById('dashBody').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${pending}</div><div class="stat-label">待確認訂單</div></div>
      <div class="stat-card"><div class="stat-value">${todayOrders.length}</div><div class="stat-label">今日新訂單</div></div>
      <div class="stat-card"><div class="stat-value">${orders.length}</div><div class="stat-label">總訂單數</div></div>
      <div class="stat-card"><div class="stat-value">${customers.length}</div><div class="stat-label">客戶數</div></div>
    </div>
    <div class="sec-title">最新訂單</div>
    ${recent.length?recent.map(o=>`<div class="recent-order">
      <div class="ro-head"><span class="ro-no">${o.id}</span><span class="status-badge ${STATUS_CLASS[o.status]||'s-pending'}">${STATUS_LABEL[o.status]||o.status}</span></div>
      <div class="ro-name">${o.customerName}${o.customerCompany?' ('+o.customerCompany+')':''}</div>
      <div class="ro-preview">${o.items.slice(0,2).map(i=>i.name+'×'+i.qty).join('、')}${o.items.length>2?'…':''}</div>
      <div class="ro-foot"><span class="ro-time">${o.createdAt.slice(0,16).replace('T',' ')}</span><span class="ro-total">${fmt(o.total)}</span></div>
    </div>`).join(''):'<div class="empty-state">尚無訂單</div>'}`;
}

function renderFilterBar(){
  const filters=[['all','全部'],['pending','待確認'],['confirmed','已確認'],['shipping','出貨中'],['done','已完成']];
  document.getElementById('filterBar').innerHTML=filters.map(([v,l])=>`<span class="filter-chip${v===orderFilter?' active':''}" onclick="setFilter('${v}')">${l}</span>`).join('');
  renderCustFilterBar();
}

function setFilter(v){ orderFilter=v; renderFilterBar(); renderOrders(); }

function renderCustFilterBar(){
  const allOrders=getOrders();
  // 從訂單中取出不重複的客戶
  const seen=new Set();
  const custs=[['all','全部客戶']];
  allOrders.sort((a,b)=>a.customerCompany?.localeCompare(b.customerCompany||'')||0).forEach(o=>{
    const key=o.customerCompany||o.customerName||'';
    if(key && !seen.has(key)){ seen.add(key); custs.push([key, key]); }
  });
  document.getElementById('custFilterBar').innerHTML=custs.map(([v,l])=>`<span class="filter-chip${v===orderCustFilter?' active':''}" onclick="setCustFilter('${v.replace(/'/g,"\\'")}')">${l}</span>`).join('');
}

function setCustFilter(v){ orderCustFilter=v; renderCustFilterBar(); renderOrders(); }

function clearDateFilter(){
  document.getElementById('orderDateFrom').value='';
  document.getElementById('orderDateTo').value='';
  renderOrders();
}

function renderOrders(){
  const dateFrom=document.getElementById('orderDateFrom')?.value||'';
  const dateTo=document.getElementById('orderDateTo')?.value||'';
  const orders=getOrders().filter(o=>{
    const statusOk=orderFilter==='all'||o.status===orderFilter;
    const custOk=orderCustFilter==='all'||(o.customerCompany||o.customerName||'')=== orderCustFilter;
    const dateStr=o.createdAt?o.createdAt.slice(0,10):'';
    const fromOk=!dateFrom||dateStr>=dateFrom;
    const toOk=!dateTo||dateStr<=dateTo;
    return statusOk&&custOk&&fromOk&&toOk;
  }).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const body=document.getElementById('ordersBody');
  if(!orders.length){body.innerHTML='<div class="empty-state">沒有符合的訂單</div>';return;}
  body.innerHTML=orders.map(o=>`<div class="order-card">
    <div class="oc-head">
      <div><div class="oc-no">${o.id}</div><div class="oc-date">${o.createdAt.slice(0,16).replace('T',' ')}</div></div>
      <span class="status-badge ${STATUS_CLASS[o.status]||'s-pending'}">${STATUS_LABEL[o.status]||o.status}</span>
    </div>
    <div class="oc-customer">${o.customerName}${o.customerCompany?' ('+o.customerCompany+')':''}</div>
    <div class="oc-contact">📞 ${o.customerPhone}</div>
    ${o.address?`<div class="oc-addr">📍 ${o.address}</div>`:''}
    ${o.deliveryDate?`<div class="oc-addr">📅 希望到貨：${o.deliveryDate}</div>`:''}
    ${o.note?`<div class="oc-note">📝 ${o.note}</div>`:''}
    <div class="oc-items">${o.items.map(i=>`${i.name} × ${i.qty} ${i.unit}  ${fmt(i.price*i.qty)}`).join('<br>')}</div>
    <div class="oc-foot">
      <span class="oc-total">${fmt(o.total)}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        ${isLimited()
          ? `<span class="status-badge s-${o.status}">${{pending:'待確認',confirmed:'已確認',shipping:'出貨中',done:'已完成'}[o.status]||o.status}</span>`
          : `<select class="status-select" onchange="updateStatus('${o.id}',this.value)">
          <option value="pending" ${o.status==='pending'?'selected':''}>待確認</option>
          <option value="confirmed" ${o.status==='confirmed'?'selected':''}>已確認</option>
          <option value="shipping" ${o.status==='shipping'?'selected':''}>出貨中</option>
          <option value="done" ${o.status==='done'?'selected':''}>已完成</option>
        </select>`}
        ${isLimited()?'': `<button onclick="deleteOrder('${o.id}')" style="background:none;border:1.5px solid #e53935;color:#e53935;border-radius:8px;padding:6px 10px;font-size:0.78rem;font-weight:700;cursor:pointer;">刪除</button>`}
      </div>
    </div>
  </div>`).join('');
}

function updateStatus(id,status){
  const orders=getOrders();
  const o=orders.find(x=>x.id===id);
  if(o){ o.status=status; saveOrders(orders); renderDashboard(); }
}

function deleteOrder(id){
  if(!confirm('確定要刪除這筆訂單？')) return;
  const orders=getOrders().filter(o=>o.id!==id);
  saveOrders(orders);
  renderDashboard();
  renderFilterBar();
  renderOrders();
}

/* ── Excel Export（Template 格式） ── */
function exportExcel(){
  const allOrders=getOrders();
  if(!allOrders.length) return alert('目前沒有訂單資料');

  // 依下單時間排序
  const orders=[...allOrders].sort((a,b)=>a.createdAt.localeCompare(b.createdAt));

  // 建立客戶查找表（ID + 帳號 + 公司名備援）
  const custMap={}, custByAccount={}, custByCompany={};
  getCustomers().forEach(c=>{
    custMap[c.id]=c;
    if(c.account) custByAccount[c.account]=c;
    if(c.company) custByCompany[c.company]=c;
  });

  // 日期範圍
  const dates=orders.map(o=>o.createdAt.slice(0,10));
  const minDate=dates[0], maxDate=dates[dates.length-1];

  // 標題列（對應 Template 的 18 欄）
  const headers=[
    '日期','序號','客戶/供應商編碼','客戶/供應商名稱',
    '承辦物流士','聯絡人','物流備註',
    '品項編碼','品項名','數量','單價',
    '外幣金額','供應價','摘要','查詢關鍵字','產生生產入庫','規格','營業稅'
  ];
  const rows=[headers];
  let rowSeq=0;
  let lastCustKey='';

  // 每張訂單的每個品項輸出一列
  orders.forEach(o=>{
    const _od=o.createdAt?new Date(o.createdAt.slice(0,10)):null;
    if(_od){ const _dow=_od.getDay(); _od.setDate(_od.getDate()+(_dow===5?3:1)); }
    const dateStr=_od?`${_od.getFullYear()}/${String(_od.getMonth()+1).padStart(2,'0')}/${String(_od.getDate()).padStart(2,'0')}`:'';;;
    const _delivDow=_od?_od.getDay():null;
    const cust=custMap[o.customerId]||custByAccount[o.customerAccount]||custByCompany[o.customerCompany]||{};
    const custCode=cust.account||o.customerAccount||o.customerId||'';
    const custName=o.customerCompany||o.customerName||'';
    const logistics=(cust.logisticsByDay&&_delivDow!==null&&cust.logisticsByDay[String(_delivDow)])||cust.logistics||'';
    const contact=cust.name||'';
    const note=o.note||'';

    // 同一客戶用同一序號，換客戶才遞增
    const custKey=custCode||custName;
    if(custKey!==lastCustKey){ rowSeq++; lastCustKey=custKey; }

    (o.items||[]).forEach(item=>{
      rows.push([
        dateStr,          // A 日期
        rowSeq,           // B 序號
        custCode,         // C 客戶/供應商編碼
        custName,         // D 客戶/供應商名稱
        logistics,        // E 承辦物流士
        contact,          // F 聯絡人
        note,             // G 物流備註
        item.code||'',    // H 品項編碼
        item.name||'',    // I 品項名
        item.qty,         // J 數量
        item.price||'',   // K 單價
        '',               // L 外幣金額
        (item.qty||0)*(item.price||0), // M 供應價
        '',               // N 摘要
        item.code||'',    // O 查詢關鍵字
        '',               // P 產生生產入庫
        item.spec||'',    // Q 規格
        ''                // R 營業稅
      ]);
    });
  });

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[
    {wch:12},{wch:16},{wch:12},{wch:22},
    {wch:10},{wch:14},{wch:22},
    {wch:12},{wch:26},{wch:6},{wch:8},
    {wch:8},{wch:8},{wch:10},{wch:12},{wch:12},{wch:16},{wch:8}
  ];
  XLSX.utils.book_append_sheet(wb,ws,'輸入銷貨單');
  XLSX.writeFile(wb,`橙沛銷貨單_${minDate}_${maxDate}.xlsx`);
}

/* ── Products ── */
let activeProdCat = 'all';
const PROD_CAT_LABELS = {'all':'全部','肉品食材':'🥩 肉品','蔬果農產品':'🥦 蔬果','醬料食材':'🧴 醬料','乾貨五金':'🧂 乾貨','茶飲食用材料':'🍵 茶飲','點心食材':'🍡 點心','米麵製品':'🍜 米麵','麵包堡體':'🍞 堡體','包材用品':'📦 包材','印刷消耗品':'🖨️ 印刷','現場硬體':'🔧 硬體','未分類':'📋 其他'};

function initProdCatBar(){
  const cats=['all',...new Set(getProducts().map(p=>p.category))];
  document.getElementById('prodCatBar').innerHTML=cats.map(cat=>`
    <span onclick="setProdCat('${cat}')" id="pcat-${cat}" style="flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;background:${cat===activeProdCat?'var(--teal)':'var(--admin-card)'};color:${cat===activeProdCat?'white':'var(--text2)'};border:1px solid ${cat===activeProdCat?'var(--teal)':'var(--admin-border)'};">
      ${PROD_CAT_LABELS[cat]||cat}
    </span>`).join('');
}

function setProdCat(cat){
  activeProdCat=cat;
  initProdCatBar();
  renderProducts();
  document.getElementById('productsBody').scrollTop=0;
}

function renderProducts(){
  const q=(document.getElementById('prodSearch')?.value||'').toLowerCase();
  const allProds=getProducts();
  const cats=['all',...new Set(allProds.map(p=>p.category))];
  if(!document.getElementById('pcat-all')) initProdCatBar();
  let prods=allProds.filter(p=>
    (activeProdCat==='all'||p.category===activeProdCat)&&
    (!q||p.name.toLowerCase().includes(q)||(p.spec||'').toLowerCase().includes(q))
  );
  const body=document.getElementById('productsBody');
  if(!prods.length){body.innerHTML='<div class="empty-state">找不到品項</div>';return;}
  // 依分類分組顯示（搜尋時攤平，選了特定分類也攤平）
  if(activeProdCat!=='all'||q){
    body.innerHTML=prods.map(p=>prodCard(p)).join('');
  } else {
    const CAT_ORDER=['肉品食材','蔬果農產品','醬料食材','乾貨五金','茶飲食用材料','點心食材','米麵製品','麵包堡體','包材用品','印刷消耗品','現場硬體','未分類'];
    const byCat={};
    prods.forEach(p=>{(byCat[p.category]=byCat[p.category]||[]).push(p);});
    const order=CAT_ORDER.filter(k=>byCat[k]);
    Object.keys(byCat).forEach(k=>{if(!order.includes(k))order.push(k);});
    body.innerHTML=order.map(cat=>`
      <div style="padding:10px 16px 4px;font-size:0.78rem;font-weight:700;color:var(--teal-light);letter-spacing:0.06em;background:var(--admin-bg);border-bottom:1px solid var(--admin-border);">
        ${PROD_CAT_LABELS[cat]||cat} <span style="color:var(--text3);font-weight:400;">(${byCat[cat].length})</span>
      </div>
      ${byCat[cat].map(p=>prodCard(p)).join('')}
    `).join('');
  }
}

function prodCard(p){
  return `<div class="prod-manage-card">
    <div class="pm-head">
      <div>
        <div class="pm-name">${p.name}</div>
        <div style="font-size:0.68rem;color:var(--text3);margin-top:1px;">編碼：${p.code}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button onclick="openProdForm('${p.code}')" style="font-size:0.75rem;padding:4px 10px;border:1.5px solid var(--teal);border-radius:8px;background:white;color:var(--teal);cursor:pointer;font-weight:600;">編輯</button>
        <button onclick="deleteProd('${p.code}')" style="font-size:0.75rem;padding:4px 10px;border:1.5px solid #e53935;border-radius:8px;background:white;color:#e53935;cursor:pointer;font-weight:600;">刪除</button>
      </div>
    </div>
    <div class="pm-spec">${p.spec||'—'} · ${p.unit}</div>
    <div class="pm-foot">
      <div class="pm-price-wrap">
        <span class="pm-price-label">售價</span>
        <input class="pm-price-input" type="number" id="price-${p.code}" value="${p.price}" step="0.5">
        <button class="pm-save-btn" onclick="savePrice('${p.code}')">儲存</button>
      </div>
      <div class="toggle-wrap">
        <button class="soldout-btn${p.status==='SOLDOUT'?' active':''}" onclick="toggleSoldOut('${p.code}')">${p.status==='SOLDOUT'?'✓ 售完中':'售完'}</button>

          <span class="slider"></span>

/* ── Product Form (Add / Edit) ── */
function openProdForm(code){
  const form=document.getElementById('prodForm');
  const errEl=document.getElementById('prodFormErr');
  errEl.style.display='none';
  if(code){
    // 編輯模式
    const p=getProducts().find(x=>x.code===code);
    if(!p) return;
    document.getElementById('prodFormTitle').textContent='編輯品項';
    document.getElementById('prodEditCode').value=code;
    document.getElementById('pf-code').value=code;
    document.getElementById('pf-code').readOnly=true;
    document.getElementById('pf-code').style.background='#f5f5f5';
    document.getElementById('pf-code').style.color='#888';
    document.getElementById('pf-code-hint').textContent='編碼建立後不可修改';
    document.getElementById('pf-name').value=p.name;
    document.getElementById('pf-unit').value=p.unit||'';
    document.getElementById('pf-spec').value=p.spec||'';
    document.getElementById('pf-price').value=p.price||'';
    document.getElementById('pf-storage').value=p.storage||'常溫';
    document.getElementById('pf-category').value=p.category||'未分類';
  } else {
    // 新增模式
    document.getElementById('prodFormTitle').textContent='新增品項';
    document.getElementById('prodEditCode').value='';
    document.getElementById('pf-code').value='';
    document.getElementById('pf-code').readOnly=false;
    document.getElementById('pf-code').style.background='white';
    document.getElementById('pf-code').style.color='#1A1A1A';
    document.getElementById('pf-code-hint').textContent='';
    ['pf-name','pf-unit','pf-spec','pf-price'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('pf-storage').value='常溫';
    document.getElementById('pf-category').value='未分類';
  }
  form.style.display='block';
  document.getElementById('pf-name').focus();
  form.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeProdForm(){
  document.getElementById('prodForm').style.display='none';
}

function saveProd(){
  const editCode=document.getElementById('prodEditCode').value;
  const inputCode=document.getElementById('pf-code').value.trim().toUpperCase();
  const name=document.getElementById('pf-name').value.trim();
  const unit=document.getElementById('pf-unit').value.trim();
  const spec=document.getElementById('pf-spec').value.trim();
  const price=parseFloat(document.getElementById('pf-price').value);
  const storage=document.getElementById('pf-storage').value;
  const category=document.getElementById('pf-category').value;
  const errEl=document.getElementById('prodFormErr');
  const showErr=msg=>{errEl.textContent=msg;errEl.style.display='block';};
  errEl.style.display='none';
  if(!inputCode) return showErr('⚠️ 請填寫品項編碼');
  if(!name) return showErr('⚠️ 請填寫品名');
  if(!unit) return showErr('⚠️ 請填寫單位');
  if(isNaN(price)||price<0) return showErr('⚠️ 請填寫有效售價');
  const prods=getProducts();
  if(editCode){
    // 更新
    const p=prods.find(x=>x.code===editCode);
    if(!p) return;
    p.name=name; p.unit=unit; p.spec=spec; p.price=price; p.storage=storage; p.category=category;
    p.category_display=document.getElementById('pf-category').options[document.getElementById('pf-category').selectedIndex].text;
  } else {
    // 新增 — 檢查編碼是否重複
    if(prods.find(x=>x.code===inputCode)) return showErr('⚠️ 此編碼已存在，請換一個');
    const catDisplay=document.getElementById('pf-category').options[document.getElementById('pf-category').selectedIndex].text;
    prods.push({code:inputCode,name,spec,unit,price,category,storage,category_display:catDisplay,status:'YES'});
  }
  saveProducts(prods);
  closeProdForm();
  initProdCatBar();
  renderProducts();
}

function deleteProd(code){
  if(!confirm('確定要刪除此品項？')) return;
  const prods=getProducts().filter(x=>x.code!==code);
  saveProducts(prods);
  initProdCatBar();
  renderProducts();
}

function savePrice(code){
  const prods=getProducts();
  const p=prods.find(x=>x.code===code);
  if(!p) return;
  const val=parseFloat(document.getElementById('price-'+code).value);
  if(isNaN(val)||val<0) return alert('請輸入有效價格');
  p.price=val; saveProducts(prods);
  alert('已儲存');
}

function toggleProduct(code,enabled){
  const prods=getProducts();
  const p=prods.find(x=>x.code===code);
  if(!p) return;
  p.status=enabled?(p.status==='SOLDOUT'?'SOLDOUT':'YES'):'NO';
  saveProducts(prods);
  renderProducts();
}

function toggleSoldOut(code){
  const prods=getProducts();
  const p=prods.find(x=>x.code===code);
  if(!p) return;
  p.status = p.status==='SOLDOUT' ? 'YES' : 'SOLDOUT';
  saveProducts(prods);
  renderProducts();
}

function openCustForm(id){
  document.getElementById('custErr').style.display='none';
  document.getElementById('custEditId').value=id||'';
  if(id){
    const cust=getCustomers().find(c=>c.id===id);
    if(!cust)return;
    document.getElementById('custFormTitle').textContent='編輯客戶';
    document.getElementById('custAccount').value=cust.account||'';
    document.getElementById('custName').value=cust.name||'';
    document.getElementById('custCompany').value=cust.company||'';
    document.getElementById('custLogistics').value=cust.logistics||'';
    document.getElementById('custPhone').value=cust.phone||'';
    document.getElementById('custMobile').value=cust.mobile||'';
    document.getElementById('custPw').value='';
    document.getElementById('custPw').placeholder='不修改請留空';
    const od=cust.orderDays||[];

function saveCust(){
  try {
    const id=document.getElementById('custEditId').value;
    const account=document.getElementById('custAccount').value.trim();
    const name=document.getElementById('custName').value.trim();
    const company=document.getElementById('custCompany').value.trim();
    const logistics=document.getElementById('custLogistics').value.trim();
    const phone=document.getElementById('custPhone').value.trim();
    const mobile=document.getElementById('custMobile').value.trim();
    const orderDays=[0,1,2,3,4,5,6].filter(d=>document.getElementById('od'+d).checked);
    const pw=document.getElementById('custPw').value;
    const errEl=document.getElementById('custErr');
    const showCustErr=msg=>{errEl.textContent=msg;errEl.style.display='block';errEl.style.fontSize='0.9rem';errEl.style.padding='8px';errEl.style.background='#fff0f0';errEl.style.borderRadius='6px';};
    errEl.style.display='none';
    if(!account) return showCustErr('⚠️ 請填寫帳號');
    if(!name) return showCustErr('⚠️ 請填寫姓名');
    if(!id && pw.length<4) return showCustErr('⚠️ 密碼至少4碼');
    const customers=getCustomers();
    if(customers.find(cu=>cu.account===account && cu.id!==id)) return showCustErr('⚠️ 此帳號已存在');
    if(id){
      const idx=customers.findIndex(cu=>cu.id===id);
      if(idx<0) return;
      customers[idx]={...customers[idx],account,name,company,logistics,phone,mobile,orderDays};
      if(pw && pw.length>=4) customers[idx].pw=pw;
    } else {
      customers.push({id:'C'+Date.now(),account,name,company,logistics,phone,mobile,orderDays,pw,createdAt:new Date().toISOString()});
    }
    saveCustomers(customers);
    closeCustForm();
    renderCustomers();
  } catch(e) {
    alert('儲存失敗：'+e.message);
  }
}

function deleteCust(id){
  if(!confirm('確定刪除此客戶帳號？')) return;
  const customers=getCustomers().filter(c=>c.id!==id);
  saveCustomers(customers);
  renderCustomers();
}

function renderCpList(){
  const q = document.getElementById('cpSearch').value.toLowerCase();
  const allProds = getProducts();
  // 先按搜尋詞過濾
  const searchFiltered = q ? allProds.filter(p=>p.name.toLowerCase().includes(q)||(p.spec||'').toLowerCase().includes(q)) : allProds;
  // 算出現有分類（用搜尋後的結果決定哪些分類要顯示）
  const availCats = [];
  const byCatAll = {};
  searchFiltered.forEach(p=>{ (byCatAll[p.category]=byCatAll[p.category]||[]).push(p); });
  CAT_ORDER.forEach(c=>{ if(byCatAll[c]) availCats.push(c); });
  Object.keys(byCatAll).forEach(c=>{ if(!availCats.includes(c)) availCats.push(c); });
  // 渲染分類 chips
  const bar = document.getElementById('cpCatBar');
  const chipStyle = (active) => `display:inline-flex;align-items:center;padding:5px 13px;border-radius:20px;border:1.5px solid ${active?'var(--teal)':'var(--admin-border)'};background:${active?'var(--teal)':'var(--admin-bg)'};color:${active?'white':'var(--text2)'};font-size:0.78rem;font-weight:${active?700:400};cursor:pointer;white-space:nowrap;flex-shrink:0;`;
  bar.innerHTML = `<button style="${chipStyle(cpActiveCat==='all')}" onclick="cpActiveCat='all';renderCpList()">全部</button>`
    + availCats.map(cat=>`<button style="${chipStyle(cpActiveCat===cat)}" onclick="cpActiveCat='${cat}';renderCpList()">${CAT_LABELS_CP[cat]||cat}</button>`).join('');
  // 再按分類過濾
  const filtered = cpActiveCat==='all' ? searchFiltered : searchFiltered.filter(p=>p.category===cpActiveCat);
  // 更新計數
  document.getElementById('cpCount').textContent = `已選 ${cpSelected.size} / ${allProds.length} 個品項`;
  // 依分類分組
  const byCat = {};
  filtered.forEach(p=>{ (byCat[p.category]=byCat[p.category]||[]).push(p); });
  const catOrder = CAT_ORDER.filter(cat=>byCat[cat]);
  // 未在 CAT_ORDER 的分類也加入
  Object.keys(byCat).forEach(cat=>{ if(!catOrder.includes(cat)) catOrder.push(cat); });
  document.getElementById('cpList').innerHTML = catOrder.map(cat=>{
    const items = byCat[cat];
    const allChecked = items.every(p=>cpSelected.has(p.code));
    const someChecked = items.some(p=>cpSelected.has(p.code));
    return `<div style="border-bottom:1px solid var(--admin-border);">
      <div style="display:flex;align-items:center;padding:10px 16px;background:var(--admin-card);gap:10px;cursor:pointer;" onclick="cpToggleCat('${cat}')">
        <input type="checkbox" ${allChecked?'checked':someChecked?'indeterminate':''} onclick="event.stopPropagation();cpToggleCat('${cat}')" style="width:16px;height:16px;accent-color:var(--teal);cursor:pointer;" ${someChecked&&!allChecked?'ref="indeterminate"':''}>
        <span style="font-weight:700;color:var(--teal-light);flex:1;">${CAT_LABELS_CP[cat]||cat}</span>
        <span style="font-size:0.78rem;color:var(--text3);">${items.filter(p=>cpSelected.has(p.code)).length}/${items.length}</span>
      </div>
      ${items.map(p=>`
      <div style="display:flex;align-items:center;padding:9px 16px 9px 40px;border-top:1px solid var(--admin-border);gap:10px;" onclick="cpToggleOne('${p.code}')">
        <input type="checkbox" id="cp_${p.code}" ${cpSelected.has(p.code)?'checked':''} onclick="event.stopPropagation();cpToggleOne('${p.code}')" style="width:15px;height:15px;accent-color:var(--teal);cursor:pointer;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.88rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
          <div style="font-size:0.72rem;color:var(--text3);">${p.code}${p.spec?` · ${p.spec}`:''}</div>
        </div>
        <div style="font-size:0.78rem;color:var(--text2);white-space:nowrap;">${p.unit} $${p.price}</div>
      </div>`).join('')}
    </div>`;
  }).join('');
  // 補上 indeterminate 狀態（無法在 HTML 屬性設定，需 JS）
  catOrder.forEach(cat=>{
    const items = byCat[cat];
    const allChecked = items.every(p=>cpSelected.has(p.code));
    const someChecked = items.some(p=>cpSelected.has(p.code));
    // find the category checkbox - it's the first checkbox in the category div
  });
}

function cpToggleOne(code){
  if(cpSelected.has(code)) cpSelected.delete(code);
  else cpSelected.add(code);
  renderCpList();
}

function cpToggleCat(cat){
  const items = getProducts().filter(p=>p.category===cat);
  const allChecked = items.every(p=>cpSelected.has(p.code));
  if(allChecked) items.forEach(p=>cpSelected.delete(p.code));
  else items.forEach(p=>cpSelected.add(p.code));
  renderCpList();
}

function cpSelectAll(val){
  const allProds = getProducts();
  if(val) allProds.forEach(p=>cpSelected.add(p.code));
  else cpSelected.clear();
  renderCpList();
}

function saveCustProducts(){
  const customers = getCustomers();
  const idx = customers.findIndex(c=>c.id===cpCustId);
  if(idx<0) return;
  const allProds = getProducts();
  // 若全選則存 null（不限制）
  if(cpSelected.size === allProds.length) customers[idx].allowedProducts = null;
  else customers[idx].allowedProducts = [...cpSelected];
  saveCustomers(customers);
  backToCustomers();
  renderCustomers();
}

async function syncLocalToCloud(){
  const msg = document.getElementById('syncCloudMsg');
  const btn = document.getElementById('syncCloudBtn');
  if(!db){
    msg.style.display='block';
    msg.style.color='#c00';
    msg.textContent='⚠️ 尚未連接 Firebase，請先填寫 firebase-config.js';
    return;
  }
  btn.disabled = true;
  btn.textContent = '同步中…';
  msg.style.display='none';
  try{
    const products  = JSON.parse(localStorage.getItem('cp_products')||'null') || INIT_PRODUCTS;
    const orders    = JSON.parse(localStorage.getItem('cp_orders')||'[]');
    const customers = JSON.parse(localStorage.getItem('cp_customers')||'[]');
    const config    = {
      adminPw: localStorage.getItem('cp_admin_pw') || DEFAULT_PW,
      limitedAdminPw: localStorage.getItem('cp_admin_limited_pw') || DEFAULT_LIMITED_PW
    };
    await Promise.all([
      db.collection('cp_data').doc('products').set({data: products}),
      db.collection('cp_data').doc('orders').set({data: orders}),
      db.collection('cp_data').doc('customers').set({data: customers}),
      db.collection('cp_data').doc('config').set({data: config}),
    ]);
    // 同步 _CACHE
    _CACHE.products  = products;
    _CACHE.orders    = orders;
    _CACHE.customers = customers;
    _CACHE.config    = config;
    msg.style.display='block';
    msg.style.color='var(--teal)';
    msg.textContent='✅ 已成功同步到雲端！';
  } catch(e){
    msg.style.display='block';
    msg.style.color='#c00';
    msg.textContent='同步失敗：' + e.message;
  } finally{
    btn.disabled = false;
    btn.textContent = '☁️ 同步本機資料到雲端';
  }
}
