<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="澄食訂貨">
<meta name="theme-color" content="#007787">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>澄食晨食 客戶訂貨</title>
<style>
:root{
  --yellow:#F5A200;--yellow2:#F8B616;--yellow-bg:#FEF3DC;
  --teal:#007787;--teal-dark:#005f6e;--teal-light:#2BB7B3;--teal-bg:#E6F4F5;
  --beige:#F3DFCC;--beige-dark:#EAD0B6;
  --white:#FFFFFF;--text:#1C2B2D;--text2:#4A6568;--text3:#9AB0B3;
  --divider:#EBF0F0;--shadow:rgba(0,119,135,0.08);
  --radius:14px;--radius-sm:8px;
  --tab-h:64px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,'PingFang TC','Helvetica Neue',sans-serif;background:var(--beige);color:var(--text);display:flex;flex-direction:column;height:100dvh;}

/* ── Header ── */
.app-header{background:var(--teal);color:var(--white);height:calc(var(--header-h,56px) + var(--safe-top));padding-top:var(--safe-top);display:flex;align-items:center;justify-content:space-between;padding-left:18px;padding-right:14px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
.header-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.header-logo{width:44px;height:34px;background:transparent;border-radius:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-title{font-size:1rem;font-weight:700;letter-spacing:0.02em;}
.header-sub{font-size:0.68rem;opacity:0.7;margin-top:1px;letter-spacing:0.05em;}
.header-right{flex:1;min-width:0;display:flex;align-items:center;justify-content:flex-end;gap:8px;padding-left:8px;}
.header-user{font-size:0.78rem;opacity:0.9;min-width:0;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.header-logout{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:16px;padding:5px 11px;font-size:0.75rem;cursor:pointer;}
.header-logout:active{background:rgba(255,255,255,0.25);}
.header-cart{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);border-radius:22px;padding:7px 12px 7px 10px;cursor:pointer;}
.header-cart:active{background:rgba(255,255,255,0.25);}
.header-badge{background:var(--yellow);color:var(--teal);border-radius:10px;min-width:20px;height:20px;font-size:0.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.header-stripe{height:26px;background:linear-gradient(90deg,var(--yellow) 0%,var(--yellow2) 40%,var(--teal-light) 100%);flex-shrink:0;display:flex;align-items:center;padding:0 12px;}
.header-stripe-name{font-size:0.78rem;font-weight:700;color:var(--teal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Screens ── */
.screens{flex:1;overflow:hidden;position:relative;min-height:0;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── Login ── */
.login-screen{background:var(--beige);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:0;overflow-y:auto;position:relative;}
.login-logo{background:transparent;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.login-brand{font-size:1.4rem;font-weight:800;color:var(--teal);margin-bottom:4px;}
.login-slogan{font-size:0.78rem;color:var(--text2);letter-spacing:0.08em;margin-bottom:28px;}
.login-card{background:var(--white);border-radius:20px;padding:24px 22px;width:100%;max-width:360px;box-shadow:0 4px 24px var(--shadow);}
.login-tabs{display:none;}


.field{margin-bottom:14px;}
.field label{display:block;font-size:0.72rem;font-weight:700;color:var(--teal);margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--divider);border-radius:var(--radius-sm);font-size:0.95rem;outline:none;color:var(--text);font-family:inherit;background:var(--beige);}
.field input:focus{border-color:var(--teal);background:white;}
.login-btn{width:100%;padding:14px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:800;cursor:pointer;margin-top:4px;letter-spacing:0.02em;}
.login-btn:active{background:var(--teal-dark);}
.login-err{color:#e53935;font-size:0.82rem;text-align:center;margin-top:10px;display:none;}
.login-err.show{display:block;}

/* ── Catalog ── */
.search-bar{background:var(--white);padding:12px 14px 10px;border-bottom:1px solid var(--divider);flex-shrink:0;}
.search-wrap{background:var(--beige);border-radius:var(--radius);display:flex;align-items:center;gap:8px;padding:9px 14px;border:1.5px solid transparent;transition:border-color 0.2s;}
.search-wrap:focus-within{border-color:var(--teal-light);background:white;}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;font-size:0.93rem;color:var(--text);}
.search-wrap input::placeholder{color:var(--text3);}
.cat-bar{background:var(--white);overflow-x:auto;white-space:nowrap;padding:10px 14px;border-bottom:1px solid var(--divider);flex-shrink:0;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:20px;margin-right:7px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1.5px solid var(--divider);background:var(--white);color:var(--text2);transition:all 0.15s;}
.cat-chip.active{background:var(--teal);color:var(--white);border-color:var(--teal);}
.product-list{flex:1;overflow-y:auto;padding:12px 13px;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 12px);max-width:680px;margin:0 auto;width:100%;}
.product-list::-webkit-scrollbar{width:3px;}
.product-list::-webkit-scrollbar-thumb{background:var(--beige-dark);border-radius:3px;}
.prod-card{background:var(--white);border-radius:14px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px var(--shadow);}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:0.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-spec{font-size:0.7rem;color:var(--text2);margin-top:1px;}
.prod-tags{display:none;}
.tag{font-size:0.65rem;padding:2px 7px;border-radius:8px;font-weight:500;}
.tag-n{background:var(--beige);color:var(--text2);}
.tag-cold{background:#E3F6F5;color:var(--teal);}
.tag-freeze{background:#E8F4FB;color:#1565C0;}
.tag-cat{background:var(--teal-bg);color:var(--teal);}
.prod-foot{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.prod-price{font-size:0.88rem;font-weight:800;color:var(--teal);white-space:nowrap;}
.prod-unit{font-size:0.68rem;font-weight:400;color:var(--text3);margin-left:1px;}
.prod-actions{display:flex;align-items:center;gap:5px;}
.qty-row{display:flex;align-items:center;gap:3px;}
.q-btn{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--divider);background:var(--white);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--teal);font-weight:600;}
.q-btn:active{background:var(--teal-bg);}
.q-num{width:36px;text-align:center;font-size:0.8rem;font-weight:700;border:none;outline:none;color:var(--text);background:transparent;-moz-appearance:textfield;}
.q-num::-webkit-inner-spin-button,.q-num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.add-btn{padding:5px 10px;background:var(--teal);color:var(--white);border:none;border-radius:8px;font-size:0.72rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.add-btn:active{background:var(--teal-dark);}
.add-btn.added{background:var(--yellow);color:var(--text);}
.unavailable{opacity:0.45;pointer-events:none;}
.no-results{text-align:center;color:var(--text3);padding:60px 20px;font-size:0.9rem;}

/* ── Cart ── */
.cart-body{flex:1;overflow-y:auto;padding:12px 13px calc(var(--tab-h) + var(--safe-bottom) + 12px);}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text3);text-align:center;}
.cart-empty .big-icon{font-size:3rem;margin-bottom:12px;opacity:0.5;}
.cart-empty p{font-size:0.9rem;line-height:1.7;}
.cart-empty-action{margin-top:18px;padding:10px 24px;background:var(--teal);color:white;border:none;border-radius:22px;font-size:0.88rem;font-weight:700;cursor:pointer;}
.cart-item{background:var(--white);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px var(--shadow);}
.cart-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.cart-item-name{font-weight:700;font-size:0.92rem;flex:1;margin-right:10px;color:var(--text);}
.cart-del{background:none;border:none;color:var(--text3);font-size:1rem;cursor:pointer;padding:2px;line-height:1;}
.cart-del:active{color:#e53935;}
.cart-item-spec{font-size:0.74rem;color:var(--text2);margin-bottom:10px;}
.cart-item-foot{display:flex;align-items:center;justify-content:space-between;}
.cart-item-sub{font-weight:800;font-size:0.95rem;color:var(--teal);}
.cart-bar{background:var(--white);border-top:1px solid var(--divider);padding:12px 16px calc(var(--tab-h) + var(--safe-bottom) + 12px);flex-shrink:0;box-shadow:0 -4px 12px var(--shadow);}
.cart-bar-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.cart-bar-label{font-size:0.82rem;color:var(--text2);}
.cart-bar-total{font-size:1.25rem;font-weight:800;color:var(--teal);}
.go-btn{width:100%;padding:15px;background:var(--teal);color:var(--white);border:none;border-radius:var(--radius);font-size:1rem;font-weight:800;cursor:pointer;transition:background 0.15s;}
.go-btn:active{background:var(--teal-dark);}
.go-btn:disabled{background:var(--divider);color:var(--text3);cursor:not-allowed;}

/* ── Order Form ── */
.order-body{flex:1;overflow-y:auto;padding:16px 13px calc(var(--tab-h) + var(--safe-bottom) + 16px);}
.sec-label{font-size:0.72rem;font-weight:800;color:var(--teal);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;margin-top:20px;}
.sec-label:first-child{margin-top:0;}
.summary-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px var(--shadow);margin-bottom:4px;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;font-size:0.87rem;border-bottom:1px solid var(--divider);}
.summary-row:last-child{border-bottom:none;}
.summary-total{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;font-size:1rem;font-weight:800;background:var(--teal);color:var(--white);border-radius:0 0 var(--radius) var(--radius);}
.form-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px var(--shadow);margin-bottom:4px;}
.form-field{padding:12px 16px;border-bottom:1px solid var(--divider);display:flex;flex-direction:column;gap:4px;}
.form-field:last-child{border-bottom:none;}
.form-label{font-size:0.72rem;font-weight:700;color:var(--teal);}
.form-field input,.form-field textarea{border:none;outline:none;font-size:0.95rem;color:var(--text);background:transparent;font-family:inherit;resize:none;}
.form-field input::placeholder,.form-field textarea::placeholder{color:var(--text3);}
.submit-wrap{margin-top:20px;}
.submit-btn{width:100%;padding:16px;background:var(--teal);color:var(--white);border:none;border-radius:var(--radius);font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:0.03em;}
.submit-btn:active{background:var(--teal-dark);}
.order-empty-hint{text-align:center;color:var(--text3);padding:60px 20px;font-size:0.9rem;line-height:1.7;}
.success-card{display:none;background:var(--white);border-radius:var(--radius);padding:36px 24px;text-align:center;box-shadow:0 2px 8px var(--shadow);margin-bottom:16px;}
.success-card.show{display:block;}
.success-anim{font-size:3rem;margin-bottom:16px;}
.success-title{font-size:1.25rem;font-weight:800;color:var(--teal);margin-bottom:8px;}
.success-no{display:inline-block;background:var(--yellow-bg);color:var(--teal);padding:6px 18px;border-radius:20px;font-weight:800;font-size:0.9rem;margin-bottom:14px;}
.success-detail{font-size:0.88rem;color:var(--text2);line-height:1.8;margin-bottom:22px;}
.success-again{padding:12px 28px;background:var(--yellow);color:var(--teal);border:none;border-radius:var(--radius);font-size:0.95rem;font-weight:800;cursor:pointer;}

/* ── My Orders ── */
.orders-body{flex:1;overflow-y:auto;padding:12px 13px calc(var(--tab-h) + var(--safe-bottom) + 12px);}
.order-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px var(--shadow);}
.order-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.order-no{font-weight:800;font-size:0.88rem;color:var(--teal);}
.order-date{font-size:0.75rem;color:var(--text3);}
.order-status{display:inline-block;padding:3px 10px;border-radius:10px;font-size:0.72rem;font-weight:700;}
.status-pending{background:#FFF3E0;color:#E65100;}
.status-confirmed{background:var(--teal-bg);color:var(--teal);}
.status-shipping{background:#E8F5E9;color:#2E7D32;}
.status-done{background:var(--beige);color:var(--text2);}
.order-items-preview{font-size:0.8rem;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.order-total{font-weight:800;color:var(--teal);font-size:0.95rem;}

/* ── Tab Bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--white);border-top:1px solid var(--divider);display:flex;z-index:50;box-shadow:0 -3px 16px var(--shadow);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;padding:8px 0;position:relative;}
.tab-icon{font-size:1.3rem;transition:transform 0.15s;}
.tab-label{font-size:0.78rem;font-weight:700;color:var(--text3);letter-spacing:0.02em;}
.tab.active .tab-label{color:var(--teal);}
.tab.active .tab-icon{transform:scale(1.1);}
.tab-dot{position:absolute;top:8px;right:calc(50% - 18px);background:var(--yellow);color:var(--teal);border-radius:10px;min-width:18px;height:18px;font-size:0.66rem;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--white);}
.tab-dot.show{display:flex;}
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="firebase-config.js"></script>
</head>

/* ── Firebase 雲端資料庫 ── */
let db = null;
try {
  if(typeof FIREBASE_CONFIG!=='undefined' && FIREBASE_CONFIG.projectId && !FIREBASE_CONFIG.projectId.startsWith('YOUR')){
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
  }
} catch(e){ console.warn('Firebase 初始化失敗，使用本機儲存', e); }

const _CACHE = {};

async function dbLoad(key, fallback){
  if(db){
    try{
      const snap = await db.collection('cp_data').doc(key).get();
      if(snap.exists && snap.data().data !== undefined){
        _CACHE[key] = snap.data().data;
        localStorage.setItem('cp_'+key, JSON.stringify(_CACHE[key]));
        return _CACHE[key];
      }
    } catch(e){ console.warn('Firestore 讀取失敗:', key, e); }
  }
  if(_CACHE[key] !== undefined) return _CACHE[key];
  const local = localStorage.getItem('cp_'+key);
  _CACHE[key] = local ? JSON.parse(local) : fallback;
  return _CACHE[key];
}

function dbSave(key, data){
  _CACHE[key] = data;
  localStorage.setItem('cp_'+key, JSON.stringify(data));
  if(db) db.collection('cp_data').doc(key).set({data}).catch(e=>console.warn('Firestore 寫入失敗:', key, e));
}

async function initDB(){
  // 先備份本機訂單，防止雲端被舊版 App 覆蓋後本機也跟著丟失
  let localOrdersBackup = [];
  try {
    const raw = localStorage.getItem('cp_orders');
    localOrdersBackup = raw ? JSON.parse(raw) : [];
  } catch(e) {}

  await Promise.all([
    dbLoad('products', null),
    dbLoad('orders', []),
    dbLoad('customers', []),
    dbLoad('announcement', {text:'',active:false})
  ]);

  // 比對：如果本機有訂單但雲端遺失，自動合併顯示並補回雲端
  if (db && localOrdersBackup.length) {
    const cloudOrders = _CACHE.orders || [];
    const toRecover = localOrdersBackup.filter(lo => !cloudOrders.some(co => co.id === lo.id));
    if (toRecover.length) {
      // 先合併到 _CACHE，讓「我的訂單」立即顯示正確
      const merged = [...cloudOrders, ...toRecover];
      _CACHE.orders = merged;
      localStorage.setItem('cp_orders', JSON.stringify(merged));
      // 背景靜默用 transaction 補回雲端
      recoverMissingOrders(toRecover);
    }
  }

  if(!_CACHE.products || !_CACHE.products.length) _CACHE.products = INIT_PRODUCTS;
}

async function recoverMissingOrders(missing) {
  if (!db || !missing.length) return;
  try {
    const ref = db.collection('cp_data').doc('orders');
    await db.runTransaction(async (t) => {
      const snap = await t.get(ref);
      const cloud = (snap.exists && snap.data().data) ? snap.data().data : [];
      let added = 0;
      missing.forEach(o => {
        if (!cloud.some(c => c.id === o.id)) { cloud.push(o); added++; }
      });
      if (added > 0) {
        t.set(ref, {data: cloud});
        _CACHE.orders = cloud;
        localStorage.setItem('cp_orders', JSON.stringify(cloud));
      }
    });
  } catch(e) { console.warn('訂單自動補回失敗:', e); }
}

async function forceUpdateApp(){

  try{

function fmt(n){return '$'+(Math.round(n*10)/10).toLocaleString();}

function twISOString(){const d=twNow(),pad=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}
function twDateStr(){const d=twNow(),pad=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}

function adjQty(code,d){const el=document.getElementById('qty-'+code);if(!el)return;let v=Math.max(0,(parseInt(el.value)||0)+d);el.value=v;updateAddBtn(code,v);if(cart[code]){cart[code].qty=v;syncAll();}}
function setQtyInput(code,v){v=Math.max(0,parseInt(v)||0);document.getElementById('qty-'+code).value=v;updateAddBtn(code,v);if(cart[code]){cart[code].qty=v;syncAll();}}
function updateAddBtn(code,qty){const btn=document.getElementById('addbtn-'+code);if(!btn||btn.classList.contains('added'))return;const on=qty>0;btn.disabled=!on;btn.style.opacity=on?'1':'0.35';btn.style.cursor=on?'pointer':'not-allowed';}
function addToCart(code){
  const p=getProducts().find(x=>x.code===code);
  const q=parseInt(document.getElementById('qty-'+code)?.value)||0;
  if(q<=0) return;
  cart[code]=cart[code]?{...cart[code],qty:cart[code].qty+q}:{...p,qty:q};
  const btn=document.getElementById('addbtn-'+code);
  if(btn){btn.textContent='✓ 已加入';btn.classList.add('added');}
  const el=document.getElementById('qty-'+code);
  if(el) el.value=0;
  syncAll();
}

function getCompanyClosedDays(){
  try{return JSON.parse(localStorage.getItem('cp_closed_days')||'[]');}catch(e){return[];}
}
function isOrderTimeOk(){
  const from=localStorage.getItem('cp_order_time_from')||'06:00';
  const to=localStorage.getItem('cp_order_time_to')||'12:30';
  const now=twNow();
  const cur=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  return cur>=from && cur<=to;
}
function getOrderTimeText(){
  const from=localStorage.getItem('cp_order_time_from')||'06:00';
  const to=localStorage.getItem('cp_order_time_to')||'12:30';
  return `下單時間：${from} ～ ${to}`;
}
function isOrderDayOk(){
  const today=twNow().getDay();
  const closed=getCompanyClosedDays();
  if(closed.includes(today)) return false;
  if(!currentUser||!currentUser.orderDays||!currentUser.orderDays.length) return true;
  return currentUser.orderDays.includes(today);
}
function getOrderDaysText(){
  const dl=['日','一','二','三','四','五','六'];
  const closed=getCompanyClosedDays();
  const today=twNow().getDay();
  if(closed.includes(today)){
    return '公司休假日：週'+closed.map(d=>dl[d]).join('、週');
  }
  if(!currentUser||!currentUser.orderDays||!currentUser.orderDays.length) return '每天皆可叫貨';
  return '叫貨日：週'+currentUser.orderDays.map(d=>dl[d]).join('、週');
}

async function submitOrder(){
  if(!isOrderDayOk()){alert('今天不是叫貨日，無法送出訂單。\n'+getOrderDaysText());return;}
  if(!isOrderTimeOk()){alert('目前不在下單時段內，無法送出訂單。\n'+getOrderTimeText());return;}
  const items=Object.values(cart);
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const note=document.getElementById('custNote').value.trim();
  const _d=twNow(),_pad=n=>String(n).padStart(2,'0');
  const no=`${_d.getFullYear()}${_pad(_d.getMonth()+1)}${_pad(_d.getDate())}-${_pad(_d.getHours())}${_pad(_d.getMinutes())}`;
  const order={
    id:no,customerId:currentUser.id,customerAccount:currentUser.account||'',
    customerName:currentUser.name,
    customerCompany:currentUser.company||'',customerPhone:currentUser.phone,
    items:JSON.parse(JSON.stringify(items)),total,note,status:'pending',
    createdAt:twISOString()
  };

  // 先存到 localStorage（備份）
  const orders=getOrders();orders.push(order);
  _CACHE.orders=orders;
  localStorage.setItem('cp_orders',JSON.stringify(orders));

  // 立即清空購物車，避免使用者離開成功畫面後購物車殘留品項
  cart={};
  if(currentUser) localStorage.removeItem('cp_cart_'+currentUser.id);
  syncAll();renderProducts();

  // 等待 Firestore 寫入，確認成功
  // 使用交易（transaction）讀取雲端最新訂單清單後再加入，避免多人同時下單互相覆蓋遺失
  let firestoreOk=false;
  if(db){
    try{
      const ref=db.collection('cp_data').doc('orders');
      await db.runTransaction(async(t)=>{
        const snap=await t.get(ref);
        const cloudOrders=(snap.exists && snap.data().data) ? snap.data().data : [];
        if(!cloudOrders.some(o=>o.id===order.id)) cloudOrders.push(order);
        t.set(ref,{data:cloudOrders});
        _CACHE.orders=cloudOrders;
        localStorage.setItem('cp_orders',JSON.stringify(cloudOrders));
      });
      firestoreOk=true;
    }catch(e){ console.warn('Firestore 寫入失敗:',e); }
  }

  callFn('notifyAdmin',{customerName:currentUser.name,customerCompany:currentUser.company||''});
  document.getElementById('orderForm').style.display='none';
  const sc=document.getElementById('successCard');sc.classList.add('show');
  document.getElementById('successNo').textContent='訂單編號：'+no;
  const _showP=currentUser&&currentUser.showPrice;
  document.getElementById('successDetail').innerHTML=`訂購人：${currentUser.name}${currentUser.company?'（'+currentUser.company+'）':''}<br>共 ${items.length} 種品項${_showP?'，合計 '+fmt(total):''}<br>${dt?'希望到貨：'+dt+'<br>':''}我們將盡快與您聯繫確認。`;

  // 若 Firestore 失敗，顯示警告
  const warn=document.getElementById('orderSyncWarning');
  if(warn) warn.style.display=firestoreOk?'none':'block';
}

function syncAll(){
  // 存購物車到 localStorage
  if(currentUser) localStorage.setItem('cp_cart_'+currentUser.id, JSON.stringify(cart));
  const items=Object.values(cart);
  const cnt=items.reduce((s,i)=>s+i.qty,0);
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const showP=currentUser&&currentUser.showPrice;
  document.getElementById('cartTotal').textContent=fmt(total);
  document.getElementById('cartTotalRow').style.display=showP?'flex':'none';
  const dot=document.getElementById('tabDot');
  dot.textContent=cnt;dot.classList.toggle('show',cnt>0);
  renderCart();renderCheckout();
}

function goTab(tab){
  ['catalog','cart','checkout','orders'].forEach(t=>{
    document.getElementById('screen-'+t).classList.toggle('active',t===tab);
    const tabEl=document.getElementById('tab-'+t);
    if(tabEl) tabEl.classList.toggle('active',t===tab);
  });
  if(tab==='orders') renderMyOrders();
}

function initApp(){
  // 讀回購物車
  if(currentUser){
    try{ cart=JSON.parse(localStorage.getItem('cp_cart_'+currentUser.id)||'{}'); }catch(e){ cart={}; }
  }
  initCats(); renderProducts(); syncAll();
}

async function initFCM(role,account){
  try{
    if(!('Notification' in window)) return;
    const perm=await Notification.requestPermission();
    if(perm!=='granted') return;
    const msg=firebase.messaging();
    const token=await msg.getToken({vapidKey:VAPID_KEY});
    if(!token||!db) return;
    await db.collection('fcm_tokens').doc(token).set({token,role,account:account||'',updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){ console.warn('FCM init:',e); }
}
function callFn(name,data){
  try{
    const fn=firebase.app().functions('asia-east1');
    fn.httpsCallable(name)(data).catch(e=>console.warn('FCM call failed:',e));
  }catch(e){ console.warn('FCM call:',e); }
}
