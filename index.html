<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="澄食訂貨">
<meta name="theme-color" content="#007787">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>澄食晨食 訂貨系統</title>
<style>
:root{
  --yellow:#F5A200;--yellow2:#F8B616;--teal:#007787;--teal-light:#2BB7B3;
  --beige:#F3DFCC;--beige2:#EAD0B6;--text:#1C2B2D;--text2:#4A6568;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:-apple-system,'PingFang TC','Helvetica Neue',sans-serif;
  background:var(--beige);
  height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
}



/* ── Teal header band ── */
.header-band{
  background:var(--teal);
  padding:14px 20px 12px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:10px;
}
.header-band-title{color:white;font-size:0.88rem;font-weight:700;letter-spacing:0.02em;}
.header-band-sub{color:rgba(255,255,255,0.6);font-size:0.65rem;letter-spacing:0.1em;margin-top:1px;}
.rainbow-stripe{
  height:3px;
  background:linear-gradient(90deg,var(--yellow) 0%,var(--yellow2) 40%,var(--teal-light) 100%);
  flex-shrink:0;
}

/* ── Main content ── */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:0 0 0;
  overflow:hidden;
  position:relative;
}

/* ── Character hero ── */
.hero{
  position:relative;
  width:100%;
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:24px 0 12px;
}
.hero-bg-text{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(100px,35vw,200px);
  font-weight:900;
  color:var(--beige2);
  opacity:0.45;
  letter-spacing:-0.05em;
  pointer-events:none;
  white-space:nowrap;
  user-select:none;
}
.char-img{
  position:relative;
  z-index:2;
  width:clamp(110px,36vw,190px);
  height:auto;
  object-fit:contain;
  margin-bottom:8px;
}
.brand-block{
  display:none;
}
.brand-name{
  font-size:clamp(1.5rem,7vw,2.2rem);
  font-weight:900;
  color:var(--teal);
  letter-spacing:0.06em;
  line-height:1.1;
}
.brand-slogan{
  font-size:clamp(0.72rem,3vw,0.9rem);
  color:var(--text2);
  letter-spacing:0.12em;
  margin-top:4px;
}

/* ── Entry cards ── */
.entry-section{
  width:100%;
  padding:0 16px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.entry-card{
  display:flex;
  align-items:center;
  gap:12px;
  background:white;
  border-radius:14px;
  padding:11px 14px;
  text-decoration:none;
  box-shadow:0 3px 16px rgba(0,119,135,0.10);
  transition:transform 0.1s;
  width:100%;
  max-width:300px;
}
.entry-card:active{transform:scale(0.98);}
.entry-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.ic-customer{background:#E6F4F5;}
.ic-admin{background:#1C2B2D;}
.entry-info{flex:1;}
.entry-title{font-size:0.98rem;font-weight:800;color:var(--text);margin-bottom:2px;}
.entry-desc{font-size:0.75rem;color:var(--text2);}
.entry-arrow{font-size:1.3rem;color:var(--beige2);font-weight:300;}



</style>
</head>
